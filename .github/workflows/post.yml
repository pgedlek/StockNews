name: Post to X

on:
  workflow_dispatch:

  schedule:
    - cron: "39 12 * * 1-5" # 08:39 AM ET — pre-market (UTC-4)
    - cron: "26 14 * * 1-5" # 10:26 AM ET — first hour reaction
    - cron: "57 16 * * 1-5" # 12:57 PM ET — midday
    - cron: "41 19 * * 1-5" # 03:41 PM ET — last 30min before close
    - cron: "52 21 * * 1-5" # 05:52 PM ET — after-hours wrap-up 

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python -m src.main

      - name: Commit ticker history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ticker_history.json
          git diff --cached --quiet || git commit -m "chore: update ticker history [skip ci]"
          git push
