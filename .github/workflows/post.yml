name: Post to X

on:
  schedule:
    - cron: "33 12 * * 1-5" # 08:33 AM ET — pre-market (UTC-4)
    - cron: "26 14 * * 1-5" # 10:26 AM ET — first hour reaction
    - cron: "57 16 * * 1-5" # 12:57 PM ET — midday
    - cron: "41 19 * * 1-5" # 03:41 PM ET — last 30min before close
    - cron: "09 22 * * 1-5" # 06:09 PM ET — after-hours wrap-up

  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python -m src.main
